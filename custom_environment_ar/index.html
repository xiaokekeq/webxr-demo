<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Custom Environment AR</title>
	<style>
		body {
			margin: 0;
			font-family: system-ui, sans-serif;
			background: #000;
			color: #fff;
		}

		#info {
			position: fixed;
			top: 14px;
			left: 14px;
			right: 14px;
			z-index: 10;
			line-height: 1.5;
			text-shadow: 0 1px 2px rgba(0, 0, 0, 0.7);
			pointer-events: none;
		}

		#info a {
			color: #fff;
			pointer-events: auto;
		}

		#info span {
			display: block;
			margin-top: 6px;
			font-size: 14px;
		}
	</style>
</head>
<body>
	<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> custom AR environment demo
		<span id="mode-message"></span>
		<span id="status-message">Initializing...</span>
		<span>Enter AR, then tap the screen to place the reflective balls in front of you.</span>
	</div>

	<script type="importmap">
	{
		"imports": {
			"three": "https://unpkg.com/three@0.177.0/build/three.module.js",
			"three/addons/": "https://unpkg.com/three@0.177.0/examples/jsm/"
		}
	}
	</script>

	<script type="module">
		import * as THREE from 'three';
		import { ARButton } from 'three/addons/webxr/ARButton.js';

		// Edit this block later if you want to switch between one panorama
		// and a 6-face cubemap.
		const ENV_CONFIG = {
			mode: 'cubemap',
			panoramaUrl: './assets/panorama/environment.jpg',
			cubemapUrls: [
				'./assets/cubemap/px.jpg',
				'./assets/cubemap/nx.jpg',
				'./assets/cubemap/py.jpg',
				'./assets/cubemap/ny.jpg',
				'./assets/cubemap/pz.jpg',
				'./assets/cubemap/nz.jpg'
			]
		};

		let camera, scene, renderer;
		let controller;
		let reflectiveGroup;
		let modeMessage;
		let statusMessage;

		init();

		async function init() {

			modeMessage = document.getElementById( 'mode-message' );
			statusMessage = document.getElementById( 'status-message' );

			modeMessage.textContent = ENV_CONFIG.mode === 'panorama'
				? 'Mode: panorama. Put one 2:1 panorama image at custom_environment_ar/assets/panorama/environment.jpg'
				: 'Mode: cubemap. Using px/nx/py/ny/pz/nz images from custom_environment_ar/assets/cubemap/.';

			const container = document.createElement( 'div' );
			document.body.appendChild( container );

			scene = new THREE.Scene();

			camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.01, 20 );

			// Fallback light so the scene is still visible if the environment map fails.
			const fallbackLight = new THREE.HemisphereLight( 0xffffff, 0x667788, 1.5 );
			fallbackLight.position.set( 0.5, 1, 0.25 );
			scene.add( fallbackLight );

			renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
			renderer.setPixelRatio( window.devicePixelRatio );
			renderer.setSize( window.innerWidth, window.innerHeight );
			renderer.setAnimationLoop( animate );
			renderer.xr.enabled = true;
			container.appendChild( renderer.domElement );

			// PMREM preprocesses the environment map for physically based materials.
			const pmremGenerator = new THREE.PMREMGenerator( renderer );

			try {

				const envTexture = await loadEnvironment( pmremGenerator );
				scene.environment = envTexture;
				statusMessage.textContent = 'Environment loaded successfully. The two metal balls should now show clearer reflections.';

			} catch ( error ) {

				console.error( 'Environment load failed:', error );
				statusMessage.textContent = 'Environment load failed. Check that the files exist in custom_environment_ar/assets and refresh the page.';

			}

			document.body.appendChild( ARButton.createButton( renderer ) );

			reflectiveGroup = buildReflectivePreview();
			scene.add( reflectiveGroup );

			function onSelect() {

				// Place the reflective balls 1.5 meters in front of the current controller.
				reflectiveGroup.position.set( 0, 0, - 1.5 ).applyMatrix4( controller.matrixWorld );
				reflectiveGroup.quaternion.setFromRotationMatrix( controller.matrixWorld );

			}

			controller = renderer.xr.getController( 0 );
			controller.addEventListener( 'select', onSelect );
			scene.add( controller );

			window.addEventListener( 'resize', onWindowResize );

			if ( 'xr' in navigator === false ) {

				statusMessage.textContent = 'navigator.xr is not available. Open this page in Chrome on an Android device that supports WebXR AR.';

			}

		}

		function buildReflectivePreview() {

			const group = new THREE.Group();
			group.position.z = - 1.5;

			// Left: nearly mirror-like metal ball to make environment reflections obvious.
			const mirrorBall = new THREE.Mesh(
				new THREE.SphereGeometry( 0.16, 48, 48 ),
				new THREE.MeshStandardMaterial( {
					color: 0xffffff,
					metalness: 1,
					roughness: 0.02
				} )
			);
			mirrorBall.position.x = - 0.22;
			group.add( mirrorBall );

			// Right: rougher metal ball for comparing how roughness softens reflections.
			const roughMetalBall = new THREE.Mesh(
				new THREE.SphereGeometry( 0.16, 48, 48 ),
				new THREE.MeshStandardMaterial( {
					color: 0xffffff,
					metalness: 1,
					roughness: 0.35
				} )
			);
			roughMetalBall.position.x = 0.22;
			group.add( roughMetalBall );

			return group;

		}

		async function loadEnvironment( pmremGenerator ) {

			if ( ENV_CONFIG.mode === 'panorama' ) {

				const texture = await new THREE.TextureLoader().loadAsync( ENV_CONFIG.panoramaUrl );
				texture.mapping = THREE.EquirectangularReflectionMapping;
				const envRenderTarget = pmremGenerator.fromEquirectangular( texture );
				texture.dispose();
				return envRenderTarget.texture;

			}

			const cubeTexture = await new THREE.CubeTextureLoader().loadAsync( ENV_CONFIG.cubemapUrls );
			const envRenderTarget = pmremGenerator.fromCubemap( cubeTexture );
			cubeTexture.dispose();
			return envRenderTarget.texture;

		}

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();
			renderer.setSize( window.innerWidth, window.innerHeight );

		}

		function animate() {

			renderer.render( scene, camera );

		}
	</script>
</body>
</html>
