<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>WebXR Workspace</title>
	<style>
		body {
			margin: 0;
			font-family: system-ui, sans-serif;
			background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
			color: #e6edf3;
		}

		.page {
			max-width: 920px;
			margin: 0 auto;
			padding: 48px 20px 80px;
		}

		h1 {
			margin: 0 0 12px;
			font-size: 32px;
		}

		p {
			line-height: 1.6;
			color: #b7c2cf;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
			gap: 16px;
			margin-top: 28px;
		}

		.card {
			padding: 18px;
			border: 1px solid rgba(255, 255, 255, 0.08);
			border-radius: 16px;
			background: rgba(255, 255, 255, 0.03);
		}

		.card h2 {
			margin: 0 0 8px;
			font-size: 18px;
		}

		.card a {
			color: #7cc0ff;
			text-decoration: none;
		}

		.card a:hover {
			text-decoration: underline;
		}

		code {
			padding: 2px 6px;
			border-radius: 6px;
			background: rgba(255, 255, 255, 0.08);
		}
	</style>
</head>
<body>
	<div class="page">
		<h1>WebXR Workspace</h1>
		<p>这个工作区已经改成 Vite 结构。你的模型查看器使用 TypeScript 模块，官方示例统一放在 <code>official-demos/</code> 里单独学习。</p>

		<div class="grid">
			<section class="card">
				<h2>Pipe Viewer</h2>
				<p>普通 Three.js 版模型查看器，保留属性查询、模式切换和对象上方属性卡片。</p>
				<a href="/loadModel.html">打开 loadModel.html</a>
			</section>

			<section class="card">
				<h2>Pipe Viewer AR</h2>
				<p>AR 放置版模型查看器。进入 AR 后移动手机寻找地面，看到准星后点击屏幕放置模型。</p>
				<a href="/loadModelAR.html">打开 loadModelAR.html</a>
			</section>

			<section class="card">
				<h2>Official Demos</h2>
				<p>three.js 官方学习示例已经归档，避免和业务代码混在一起。</p>
			</section>
		</div>
	</div>
</body>
</html>
