<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>GLB Pipe Viewer AR</title>
	<style>
		:root {
			--bg: #0f141c;
			--panel: rgba(15, 20, 28, 0.82);
			--line: rgba(255, 255, 255, 0.12);
			--text: #edf3fa;
			--muted: #a8b6c8;
			--accent: #4ea2ff;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
			background:
				radial-gradient(circle at top, rgba(78, 162, 255, 0.16), transparent 36%),
				linear-gradient(180deg, #111722 0%, var(--bg) 100%);
			color: var(--text);
			overflow: hidden;
		}

		#app {
			position: relative;
			width: 100vw;
			height: 100vh;
		}

		#canvas-container,
		canvas {
			width: 100%;
			height: 100%;
			display: block;
		}

		.overlay {
			position: fixed;
			top: 14px;
			left: 14px;
			z-index: 20;
			width: min(340px, calc(100vw - 28px));
			padding: 14px;
			border: 1px solid var(--line);
			border-radius: 18px;
			background: var(--panel);
			backdrop-filter: blur(14px);
		}

		.overlay-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
		}

		.overlay-title {
			margin: 0;
			font-size: 20px;
		}

		.overlay-toggle {
			display: none;
			padding: 6px 10px;
			border: 1px solid var(--line);
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.04);
			color: var(--text);
			font: inherit;
			cursor: pointer;
		}

		.overlay-body {
			margin-top: 10px;
		}

		p {
			margin: 0 0 12px;
			line-height: 1.6;
			color: var(--muted);
		}

		.meta {
			padding: 12px;
			border-radius: 12px;
			background: rgba(255, 255, 255, 0.04);
			line-height: 1.7;
			font-size: 14px;
		}

		.hint {
			margin-top: 12px;
			font-size: 13px;
			line-height: 1.6;
			color: var(--muted);
		}

		.actions {
			display: flex;
			gap: 8px;
			margin-top: 12px;
			flex-wrap: wrap;
		}

		.action-button {
			padding: 8px 12px;
			border: 1px solid var(--line);
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.04);
			color: var(--text);
			cursor: pointer;
			font: inherit;
		}

		.action-button:hover,
		.overlay-toggle:hover {
			border-color: rgba(78, 162, 255, 0.6);
		}

		.xr-button-wrap :is(button, a) {
			position: fixed !important;
			left: 14px !important;
			bottom: 14px !important;
			right: auto !important;
			margin: 0 !important;
			border: 1px solid rgba(78, 162, 255, 0.5) !important;
			border-radius: 999px !important;
			background: rgba(26, 38, 54, 0.92) !important;
			color: #f4f8fc !important;
			font-family: inherit !important;
			font-size: 14px !important;
			padding: 0.9em 1.4em !important;
			opacity: 1 !important;
		}

		.property-panel {
			position: fixed;
			right: 14px;
			bottom: 84px;
			z-index: 25;
			width: min(300px, calc(100vw - 28px));
			padding: 14px;
			border: 1px solid var(--line);
			border-radius: 18px;
			background: rgba(12, 18, 28, 0.9);
			backdrop-filter: blur(16px);
			box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
		}

		.property-panel.hidden {
			display: none;
		}

		.property-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
			margin-bottom: 10px;
		}

		.property-title {
			margin: 0;
			font-size: 16px;
		}

		.property-close {
			padding: 4px 10px;
			border: 1px solid var(--line);
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.04);
			color: var(--text);
			font: inherit;
			cursor: pointer;
		}

		.property-grid {
			display: grid;
			grid-template-columns: 72px 1fr;
			gap: 8px 10px;
			font-size: 13px;
			line-height: 1.5;
		}

		.property-grid strong {
			color: var(--muted);
			font-weight: 600;
		}

		@media (max-width: 720px) {
			.overlay {
				top: 10px;
				left: 10px;
				width: calc(100vw - 20px);
				padding: 12px;
			}

			.overlay-toggle {
				display: inline-flex;
			}

			.overlay.mobile-collapsed .overlay-body {
				display: none;
			}

			.xr-button-wrap :is(button, a) {
				left: 10px !important;
				bottom: 10px !important;
			}

			.property-panel {
				right: 10px;
				bottom: 72px;
				width: calc(100vw - 20px);
			}
		}
	</style>
</head>
<body>
	<div id="app">
		<div id="overlay" class="overlay">
			<div class="overlay-header">
				<h1 class="overlay-title">GLB Pipe Viewer AR</h1>
				<button id="overlay-toggle" class="overlay-toggle" type="button" hidden aria-expanded="true">收起</button>
			</div>

			<div id="overlay-body" class="overlay-body">
				<p>这个页面专门用于学习 WebXR AR 的自动粗配准流程：进入 AR、识别地面、读取 GPS 和 IMU，并自动把模型放到大致正确的位置。</p>

				<div class="meta">
					<div><strong>模型文件：</strong><span id="model-name"></span></div>
					<div><strong>状态：</strong><span id="status">正在初始化...</span></div>
				</div>

				<div class="actions">
					<button id="enable-coarse" class="action-button" type="button">启用粗配准</button>
					<button id="refresh-geo" class="action-button" type="button">刷新定位</button>
					<button id="reset-placement" class="action-button" type="button">重置放置</button>
				</div>

				<div class="hint">
					进入 AR 后，请先缓慢移动手机帮助系统识别平面。点击“启用粗配准”后，系统会尝试结合 GPS、IMU 和 hit-test 地面结果，自动生成模型的初始位置与朝向。
				</div>
			</div>
		</div>

		<div id="canvas-container"></div>
		<div class="xr-button-wrap" id="xr-button-wrap"></div>

		<div id="ar-property-panel" class="property-panel hidden">
			<div class="property-header">
				<h2 class="property-title">管线属性</h2>
				<button id="ar-property-close" class="property-close" type="button">关闭</button>
			</div>

			<div class="property-grid">
				<strong>名称</strong><span id="ar-prop-name">-</span>
				<strong>类型</strong><span id="ar-prop-type">-</span>
				<strong>管径</strong><span id="ar-prop-diameter">-</span>
				<strong>材质</strong><span id="ar-prop-material">-</span>
				<strong>埋深</strong><span id="ar-prop-depth">-</span>
				<strong>状态</strong><span id="ar-prop-status">-</span>
				<strong>备注</strong><span id="ar-prop-remark">-</span>
			</div>
		</div>
	</div>

	<script type="module" src="./src/load-model-ar/app.ts"></script>
</body>
</html>
